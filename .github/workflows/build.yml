name: Build

on: [push, pull_request]

jobs:
  build-linux:
    name: Build on Linux
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update && \
        sudo apt-get install make automake g++ libpoppler-glib-dev libcairo2-dev pkg-config debhelper devscripts

    - name: Bootstrap
      run: ./bootstrap

    - name: Configure
      run: ./configure

    - name: Build
      run: make

    - name: Package Linux binary
      run: |
        mkdir -p linux-dist
        cp diff-pdf linux-dist/
        strip linux-dist/diff-pdf
        tar czf diff-pdf-linux-x86_64.tar.gz -C linux-dist diff-pdf

    - name: Upload Linux binary
      uses: actions/upload-artifact@v4
      with:
        name: linux-binary
        path: diff-pdf-linux-x86_64.tar.gz

    - name: Build Debian package
      run: |
        dpkg-buildpackage -b -uc -us
        mv ../diff-pdf_*.deb .

    - name: Upload Debian package
      uses: actions/upload-artifact@v4
      with:
        name: debian-package
        path: diff-pdf_*.deb

  build-macos:
    name: Build on macOS
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: brew install automake autoconf pkg-config poppler cairo glib

    - name: Bootstrap
      run: ./bootstrap

    - name: Configure
      run: |
        export PKG_CONFIG_PATH="$(brew --prefix)/lib/pkgconfig:$PKG_CONFIG_PATH"
        ./configure

    - name: Build
      run: make

    - name: Package macOS binary
      run: |
        mkdir -p macos-dist
        cp diff-pdf macos-dist/
        strip macos-dist/diff-pdf
        tar czf diff-pdf-macos.tar.gz -C macos-dist diff-pdf

    - name: Upload macOS binary
      uses: actions/upload-artifact@v4
      with:
        name: macos-binary
        path: diff-pdf-macos.tar.gz

  publish-release:
    name: Publish release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [build-linux, build-macos]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: linux-binary

      - uses: actions/download-artifact@v4
        with:
          name: debian-package

      - uses: actions/download-artifact@v4
        with:
          name: macos-binary

      - uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          prerelease: true
          artifacts: "diff-pdf-linux-x86_64.tar.gz,diff-pdf_*.deb,diff-pdf-macos.tar.gz"
          token: ${{ secrets.GITHUB_TOKEN }}
